<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>RIJAR OMNI | Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            color: #e5e7eb; 
            min-height: 100vh;
            margin: 0;
        }
        .gemini-gradient {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chat-input-container {
            background: rgba(25, 25, 25, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Responsif Scrollbar */
        #output::-webkit-scrollbar { width: 3px; }
        #output::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="flex flex-col items-center overflow-x-hidden">

    <header class="w-full max-w-4xl px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="text-lg font-bold tracking-tight">RIJAR <span class="gemini-gradient font-black text-xl">OMNI</span></h1>
        <div class="text-[9px] text-zinc-500 font-mono tracking-widest uppercase">v5.1 Fixed</div>
    </header>

    <main class="w-full max-w-3xl flex flex-col px-5 pt-8 pb-32">
        
        <div id="output" class="w-full space-y-6">
            <div id="welcome-msg" class="flex flex-col gap-1 mb-8">
                <h2 class="text-2xl md:text-4xl font-bold text-white tracking-tight">Halo, Sir Rangga</h2>
                <p class="text-zinc-500 text-sm md:text-lg">Optimasi apa yang kita jalankan hari ini?</p>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-4" id="options-panel">
            <button onclick="quickCmd('Buatkan ringkasan strategi')" class="glass-card p-4 rounded-2xl text-left hover:bg-white/5 transition-all">
                <p class="text-zinc-200 text-xs font-bold mb-1">Strategi Makro</p>
                <p class="text-zinc-500 text-[10px] leading-tight">Optimasi ROI & taktis.</p>
            </button>
            <button onclick="quickCmd('Analisis teknologi terbaru')" class="glass-card p-4 rounded-2xl text-left hover:bg-white/5 transition-all">
                <p class="text-zinc-200 text-xs font-bold mb-1">Tech Analysis</p>
                <p class="text-zinc-500 text-[10px] leading-tight">Update sistem 2026.</p>
            </button>
            <button onclick="quickCmd('Bantu saya coding')" class="glass-card p-4 rounded-2xl text-left hover:bg-white/5 transition-all">
                <p class="text-zinc-200 text-xs font-bold mb-1">Logic Script</p>
                <p class="text-zinc-500 text-[10px] leading-tight">Debugging & Dev.</p>
            </button>
        </div>
    </main>

    <div class="fixed bottom-0 w-full max-w-3xl px-4 pb-6 pt-2 bg-gradient-to-t from-black via-black/90 to-transparent">
        <div class="chat-input-container rounded-2xl p-1.5 flex items-center shadow-2xl">
            <input type="text" id="input" 
                class="bg-transparent border-none outline-none flex-grow px-4 py-2.5 text-sm text-white placeholder-zinc-600" 
                placeholder="Tanya RIJAR..." autocomplete="off">
            <button onclick="handleSend()" 
                class="bg-white text-black h-10 w-10 flex items-center justify-center rounded-xl hover:scale-95 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const optionsPanel = document.getElementById('options-panel');
        const welcomeMsg = document.getElementById('welcome-msg');

        function printChat(msg, sender = 'ai') {
            welcomeMsg.classList.add('hidden');
            optionsPanel.classList.add('opacity-40'); // Tetap ada tapi redup
            
            const div = document.createElement('div');
            div.className = sender === 'ai' ? 'w-full animate-in slide-in-from-bottom-2 duration-500' : 'w-full flex justify-end';
            
            const content = document.createElement('div');
            if(sender === 'ai') {
                content.className = 'text-zinc-300 text-sm md:text-base leading-relaxed max-w-[95%]';
                content.innerHTML = msg.replace(/\n/g, '<br>');
            } else {
                content.className = 'bg-zinc-800/80 px-4 py-2 rounded-2xl text-white text-sm shadow-md inline-block max-w-[80%]';
                content.innerText = msg;
            }
            
            div.appendChild(content);
            output.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        async function askAI(userPrompt) {
            const loading = document.createElement('div');
            loading.className = "text-xs font-bold gemini-gradient animate-pulse ml-1";
            loading.innerText = "RIJAR is thinking...";
            output.appendChild(loading);
            
            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: userPrompt })
                });

                const data = await response.json();
                output.removeChild(loading);

                if (data.choices) {
                    printChat(data.choices[0].message.content, 'ai');
                }
            } catch (err) {
                if(loading) output.removeChild(loading);
                printChat("Koneksi terputus. Cek status Vercel.", 'ai');
            }
        }

        function handleSend() {
            if (input.value.trim() !== "") {
                const val = input.value;
                printChat(val, 'user');
                input.value = "";
                askAI(val);
            }
        }

        function quickCmd(cmd) {
            input.value = cmd;
            handleSend();
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
